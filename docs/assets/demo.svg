<svg xmlns="http://www.w3.org/2000/svg" width="1003" height="470" viewBox="0 0 1003 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="1003" height="470" rx="10" fill="#0d1117"/>
  <rect width="1003" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="501" y="21" fill="#8b949e" text-anchor="middle">rulecast — one source, four rule dialects</text>

  <text x="24" y="64" fill="#7ee787" xml:space="preserve">$ rulecast build</text>
  <text x="24" y="88" fill="#3fb950" xml:space="preserve">wrote<tspan fill="#c9d1d9">      CLAUDE.md  (3 fragments)</tspan></text>
  <text x="24" y="108" fill="#3fb950" xml:space="preserve">wrote<tspan fill="#c9d1d9">      packages/web/CLAUDE.md  (1 fragment)</tspan></text>
  <text x="24" y="128" fill="#3fb950" xml:space="preserve">wrote<tspan fill="#c9d1d9">      services/api/AGENTS.md  (1 fragment)</tspan></text>
  <text x="24" y="148" fill="#3fb950" xml:space="preserve">wrote<tspan fill="#c9d1d9">      .cursor/rules/web-typescript.mdc  (1 fragment)</tspan></text>
  <text x="24" y="168" fill="#3fb950" xml:space="preserve">wrote<tspan fill="#c9d1d9">      .github/instructions/sql-style.instructions.md  (1 fragment)</tspan></text>
  <text x="24" y="188" fill="#8b949e" xml:space="preserve">…</text>
  <text x="24" y="208" fill="#8b949e" xml:space="preserve">built 14 files for 4 targets from 5 fragments: 14 written, 0 unchanged</text>
  <text x="24" y="242" fill="#7ee787" xml:space="preserve">$ rulecast check<tspan fill="#8b949e">          # in CI, after a teammate "just quickly edited" CLAUDE.md</tspan></text>
  <text x="24" y="266" fill="#d29922" xml:space="preserve">stale<tspan fill="#c9d1d9">  CLAUDE.md  (content differs from the compiled fragments — run `rulecast build`)</tspan></text>
  <text x="24" y="286" fill="#f85149" xml:space="preserve">check: FAIL — 1 problem across 14 planned files</text>
  <text x="24" y="320" fill="#7ee787" xml:space="preserve">$ rulecast lint</text>
  <text x="24" y="344" fill="#c9d1d9" xml:space="preserve">.rulecast/api-go.md:4  <tspan fill="#f85149">error L104</tspan><tspan fill="#c9d1d9">  invalid scope glob: comma outside {…}; a fragment takes a single scope glob</tspan></text>
  <text x="24" y="364" fill="#3fb950" xml:space="preserve">    hint: examples: `packages/web/**`, `services/{api,worker}/**`, `**/*.sql`</text>
  <text x="24" y="384" fill="#c9d1d9" xml:space="preserve">.rulecast/review.md:1  <tspan fill="#d29922">warning L108</tspan><tspan fill="#c9d1d9">  scope `packages/wep/**` points at `packages/wep/`, which does not exist in this repo</tspan></text>
  <text x="24" y="404" fill="#3fb950" xml:space="preserve">    hint: a typo here means the rules silently apply nowhere</text>
  <text x="24" y="424" fill="#f85149" xml:space="preserve">lint: FAIL (1 error, 1 warning)</text>
  <text x="24" y="452" fill="#8b949e" xml:space="preserve">fragments in, four dialects out — and CI knows the moment they drift</text>
</svg>
